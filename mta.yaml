_schema-version: "3.3"
ID: nexus-bridge
version: 1.0.0
description: SAP BTP ↔ Nexus license-hash integration service (CAP backend)

modules:
  # ── Node.js CAP backend ─────────────────────────────────────────────────────
  - name: nexus-srv
    type: nodejs
    path: .
    parameters:
      memory: 256M
      disk-quota: 512M
      # CRITICAL: nonce-store is in-memory. Must stay at 1 instance.
      # If you need to scale, migrate nonce-store to Redis first,
      # then remove this restriction.
      instances: 1
    properties:
      NODE_ENV: production
      # CF auto-sets this to the deployed app's route URL (no trailing slash).
      # Nexus will POST the hash to <POSTBACK_BASE>/nexus/callback?n=<nonce>.
      POSTBACK_BASE: ${default-url}
      # TODO (fill in after confirming with Ben/Nexus team):
      #   ABC_EGRESS_IPS  — comma-separated list of Nexus outbound IP addresses
      #   ABC_SIG_HEADER  — HTTP header Nexus uses for the HMAC signature
      ABC_EGRESS_IPS: ""
      ABC_SIG_HEADER: "x-nexus-signature"
      # POSTBACK_SECRET is NOT set here. It is injected at runtime from
      # BTP Credential Store or via: cf set-env nexus-srv POSTBACK_SECRET "<value>"
      # Setting it here would overwrite the live value on every deploy.
    requires:
      - name: nexus-uaa
      - name: nexus-destination
    build-parameters:
      builder: npm
      ignore:
        - node_modules/
        - .env
        - .git/
        - "*.log"
        - mta_archives/
        - .tmp/

resources:
  # ── XSUAA — SHARE the existing Fiori app's XSUAA instance ─────────────────
  # Both this MTA and the Fiori MTA bind to the SAME XSUAA instance.
  # This is what allows JWTs minted by the Fiori approuter to validate here.
  # If you create a NEW XSUAA, tokens will fail audience/signature checks.
  #
  # TODO: Replace <YOUR-XSUAA-SERVICE-NAME> with the actual CF service instance
  #       name. Find it with: cf services | grep xsuaa
  - name: nexus-uaa
    type: org.cloudfoundry.existing-service
    parameters:
      service-name: comnexusasset-xsuaa-service

  # ── Destination service — hosts the AbcLicenseServer destination ───────────
  # The AbcLicenseServer destination (OAuth2SAMLBearerAssertion) performs the
  # SAML→Graph token exchange automatically. Configure it in BTP Cockpit:
  #   Authentication:     OAuth2SAMLBearerAssertion
  #   Client Key:         App #2 Client ID  (3fa48b0f-9684-40c9-9173-b9acddc83291)
  #   Token Service URL:  https://login.microsoftonline.com/<TENANT_ID>/oauth2/v2.0/token
  #   Token Service User: App #2 Client ID
  #   Token Service Pass: App #2 Client Secret
  #   scope:              https://graph.microsoft.com/.default
  #   audience:           https://login.microsoftonline.com/<TENANT_ID>/
  #   URL.queries.id:     D1A460B9-1863-49FB-A70E-7674ADD5FB5B
  #   URL.queries.app:    AF90DA92-483C-4973-A75C-F51562589A48
  #   URL.queries.type:   Portal Application
  #   URL.queries.env:    Production
  - name: nexus-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  # ── Credential Store (add later when HMAC secret confirmed with Ben) ────────
  # Once you have the POSTBACK_SECRET from Nexus team, create credstore and bind:
  #   cf create-service credstore free nexus-credstore
  #   cf set-env nexus-srv POSTBACK_SECRET "<value-from-nexus-team>"
  #   cf restart nexus-srv

